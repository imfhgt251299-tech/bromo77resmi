        }

        .glow-on-hover::before {

            z-index: -1;
            filter: blur(5px);
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            animation: glowing 10s linear infinite;
            opacity: 1;
            border-radius: 10px
        }

        .glow-on-hover::after {
            z-index: -1;
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            left: 0;
            top: 0;
            border-radius: 10px
        }

        @keyframes glowing {
            0% {

            }

            50% {
